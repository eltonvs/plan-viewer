<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Plan Viewer — Browse AI Agent Plan Files</title>
    <meta
      name="description"
      content="Browse, search, and read markdown plan files generated by AI coding agents like Claude Code, Cursor, and Codex. Outline navigation, syntax highlighting, and multi-folder support."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plan Viewer" />
    <meta
      property="og:description"
      content="Browse, search, and read markdown plan files from AI coding agents. Syntax highlighting, outline navigation, and multi-folder support."
    />
    <meta property="og:url" content="https://planviewer.dev" />
    <meta property="og:site_name" content="Plan Viewer" />
    <meta property="og:image" content="https://planviewer.dev/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Plan Viewer" />
    <meta
      name="twitter:description"
      content="Browse, search, and read markdown plan files from AI coding agents."
    />
    <meta name="twitter:image" content="https://planviewer.dev/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://planviewer.dev" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Theme -->
    <meta name="theme-color" content="#faf9fc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />

    <!-- Keywords for discoverability -->
    <meta
      name="keywords"
      content="plan viewer, markdown viewer, AI coding agent, Claude Code, Cursor, Codex, developer tools, implementation plans"
    />
    <meta name="author" content="Elton Viana" />
    <link rel="author" href="https://eltonvs.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      if (
        localStorage.theme === "dark" ||
        (!localStorage.theme && matchMedia("(prefers-color-scheme: dark)").matches)
      )
        document.documentElement.classList.add("dark");
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <noscript
      ><img
        src="https://queue.simpleanalyticscdn.com/noscript.gif"
        alt=""
        referrerpolicy="no-referrer-when-downgrade"
    /></noscript>
  </body>
</html>
